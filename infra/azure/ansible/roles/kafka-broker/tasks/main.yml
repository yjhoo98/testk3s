---
- name: Kafka 루트 디렉토리 생성
  file:
    path: "/home/{{ ansible_user }}/kafka-cluster"
    state: directory
    mode: '0777'

- name: 브로커별 데이터 디렉토리 생성
  file:
    path: "/home/{{ ansible_user }}/kafka-cluster/data/kafka{{ item }}"
    state: directory
    mode: '0777'
  loop: [1, 2, 3]

- name: Docker Compose 템플릿 배포
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ ansible_user }}/kafka-cluster/docker-compose.yml"

- name: Kafka 브로커 컨테이너 실행
  shell:
    cmd: "docker compose up -d"
    chdir: "/home/{{ ansible_user }}/kafka-cluster"
  become: yes

- name: Kafka 서비스 안정화 대기
  pause:
    seconds: 30
    prompt: "컨테이너가 뜬 후 내부적으로 브로커들이 서로 인식할 시간이 필요합니다."

- name: raw_topic 생성 (원본 데이터 수집용)
  shell:
    cmd: >
      docker exec kafka1 kafka-topics --create 
      --topic raw_topic 
      --partitions 3 
      --replication-factor 3 
      --bootstrap-server localhost:9091
  run_once: true
  ignore_errors: yes

- name: cleansed_topic 생성 (정제 데이터 보관용)
  shell:
    cmd: >
      docker exec kafka1 kafka-topics --create 
      --topic cleansed_topic 
      --partitions 3 
      --replication-factor 3 
      --bootstrap-server localhost:9091
  run_once: true
  ignore_errors: yes

- name: 생성된 토픽 리스트 확인 (디버깅용)
  shell:
    cmd: "docker exec kafka1 kafka-topics --list --bootstrap-server localhost:9091"
  run_once: true
  register: topic_list

- name: 토픽 리스트 출력
  debug:
    msg: "현재 생성된 토픽: {{ topic_list.stdout_lines }}"
  run_once: true
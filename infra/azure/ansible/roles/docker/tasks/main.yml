---
- name: 이전 버전의 Docker 관련 패키지 삭제 (충돌 방지)
  apt:
    name: [docker, docker-engine, docker.io, containerd, runc]
    state: absent

- name: 필수 의존성 패키지 설치
  apt:
    name: [ca-certificates, curl, gnupg, lsb-release]
    state: present
    update_cache: yes

- name: Docker 공식 GPG 키 추가를 위한 디렉토리 생성
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Docker 공식 GPG 키 다운로드
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Docker 리포지토리 등록
  apt_repository:
    repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
    update_cache: yes

- name: Docker 엔진 및 Docker Compose 플러그인 설치
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Docker 서비스 시작 및 활성화
  service:
    name: docker
    state: started
    enabled: yes

# sudo 없이 작동하도록 권한 부여
- name: 현재 사용자를 docker 그룹에 추가
  user:
    name: "{{ ansible_user | default('azureuser') }}" # palja
    groups: docker
    append: yes
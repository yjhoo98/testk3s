version: '3.8'
services:
  vehicle-simulator:
    # Docker Hub ID는 공개 정보이므로 직접 기입
    image: kimsewon/vehicle-simulator:latest
    container_name: vehicle-simulator
    restart: always
    environment:
      # 실행 시점에 .env 또는 터미널에서 주입받는 Azure 브로커 공인 IP
      - KAFKA_BROKER_IP=${BROKER_PUBLIC_IP}
    volumes:
      - ./simulator.py:/app/vehicle_simulator.py
    command: python3 /app/vehicle_simulator.py
[server]
domain = grafana.monitoring.svc.cluster.local
root_url = %(protocol)s://%(domain)s:%(http_port)s/
serve_from_sub_path = false

[security]
allow_embedding = false
cookie_secure = false

[users]
allow_sign_up = false
default_theme = light

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/admin-dashboard.json
